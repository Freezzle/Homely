services:

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${DB_NAME:-homely}
      POSTGRES_USER:     ${DB_USER:-homely}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-homely}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-homely}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend Spring Boot ───────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL:      jdbc:postgresql://postgres:5432/${DB_NAME:-homely}
      DB_USER:     ${DB_USER:-homely}
      DB_PASSWORD: ${DB_PASSWORD:-homely}
      JWT_SECRET:  ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Frontend Angular ──────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4200:80"
    environment:
      API_URL: http://backend:8080

volumes:
  postgres_data:
