spring:
  application:
    name: homely

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/homely}
    username: ${DB_USER:homely}
    password: ${DB_PASSWORD:homely}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-CHANGE-IN-PRODUCTION-must-be-256-bits-minimum}
    access-expiration-ms: 900000        # 15 min
    refresh-expiration-ms: 604800000    # 7 jours
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
